name: 动漫更新自动推送
on:
  schedule:
    - cron: '8,28,48 2-12 * * *'  # 北京时间 10:08 ~ 20:48，每20分钟一次
  workflow_dispatch:

concurrency:
  group: anime-sync-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  anime-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.REPO_TOKEN || github.token }}
          persist-credentials: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: 安装所有依赖
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium

      - name: 执行金山文档推送
        env:
          APP_TOKEN: ${{ secrets.APP_TOKEN }}
        continue-on-error: true
        run: python "动漫_金山文档推送.py"

      - name: 执行Youtube推送
        env:
          APP_TOKEN: ${{ secrets.APP_TOKEN }}
        continue-on-error: true
        run: python "动漫_YouTube推送.py"

      - name: 提交历史记录
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN || github.token }}
          GIT_EMAIL: ${{ secrets.GIT_EMAIL || 'actions@github.com' }}
        run: |
          git config --local user.name "AutoUpdater"
          git config --local user.email "$GIT_EMAIL"
          git remote set-url origin "https://x-access-token:$REPO_TOKEN@github.com/$GITHUB_REPOSITORY.git"
          
          # 同步最新代码
          git pull origin main --rebase --autostash
          
          # 将可能变更的两个历史记录文件都加进去
          git add "记录_动漫_金山文档.json" "记录_动漫_YouTube.json"
          if ! git diff --staged --quiet; then
            git commit -m "自动更新历史记录: $(date +'%Y-%m-%d %H:%M')"
            git push origin HEAD:main || exit 1
          fi
