name: ETF动量轮动与推送

on:
  schedule:
    # 比如你想在北京时间 09:25 左右运行，可以提前一点点并设置一个奇怪的数字
    # 北京时间 09:18 -> UTC 01:18
    - cron: '18 1 * * 1-5'
    # 比如你想在北京时间 15:30 运行，可以提前到 15:23
    # 北京时间 15:23 -> UTC 07:23
    - cron: '23 7 * * 1-5'
  workflow_dispatch: # 允许手动触发

jobs:
  run-etf-strategy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        
      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install akshare tushare pandas numpy scikit-learn requests
          
      - name: 执行 ETF 动量轮动脚本
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TUSHARE_TOKEN: "3664fe220cb675ae1661e7ad96c51e2592a0ef72c93d29da3d65b692"
        run: python "ETF_动量轮动策略.py"

      - name: 执行 ETF_动量轮动_v295 脚本
        env:
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TUSHARE_TOKEN: "3664fe220cb675ae1661e7ad96c51e2592a0ef72c93d29da3d65b692"
        run: python "ETF_动量轮动_v295.py"
        
      - name: 提交并推送虚拟持仓更新
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add "记录_ETF_虚拟持仓.json"
          git commit -m "chore: 更新虚拟持仓数据 [skip ci]" || echo "持仓文件无变化，无需提交"
          git push
